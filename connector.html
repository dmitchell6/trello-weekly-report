<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Trello Weekly Report Power-Up</title>
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://trello.com">
    <script src="https://p.trellocdn.com/power-up.min.js" allow="same-origin"></script>
    <script src="config.js"></script>
</head>
<body>
    <script>
        window.TrelloPowerUp.initialize({
            'board-buttons': function(t, options) {
                return [{
                    icon: {
                        dark: '/images/icon-dark.svg',
                        light: '/images/icon-light.svg'
                    },
                    text: 'Weekly Report',
                    callback: function(t) {
                        return t.modal({
                            url: './index.html',
                            title: 'Weekly Report',
                            height: 600
                        });
                    }
                }];
            },
            'authorization-status': function(t, options) {
                return t.get('member', 'private', 'token')
                    .then(function(token) {
                        return { authorized: token != null };
                    });
            },
            'show-authorization': function(t, options) {
                return t.popup({
                    title: 'Authorize Weekly Report',
                    url: 'http://192.168.6.124:8000/auth-success.html',  <!-- Updated to your existing file -->
                    height: 140
                });
            }
        });
    </script>
</body>
</html>
