<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Trello Weekly Report Power-Up</title>
</head>
<body>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        window.TrelloPowerUp.initialize({
            'board-buttons': function(t, options) {
                return [{
                    icon: {
                        dark: 'https://dmitchell6.github.io/trello-weekly-report/images/icon-dark.svg',
                        light: 'https://dmitchell6.github.io/trello-weekly-report/images/icon-light.svg'
                    },
                    text: 'Weekly Report',
                    callback: function(t) {
                        return t.modal({
                            url: 'https://dmitchell6.github.io/trello-weekly-report/index.html',
                            height: 600,
                            title: 'Weekly Report'
                        });
                    }
                }];
            },
            'authorization-status': function(t, options) {
                return t.get('member', 'private', 'token')
                    .then(function(token) {
                        return { authorized: token != null };
                    });
            },
            'show-authorization': function(t, options) {
                return t.popup({
                    title: 'Authorize Weekly Report',
                    url: 'https://dmitchell6.github.io/trello-weekly-report/auth.html',
                    height: 140
                });
            }
        });
    </script>
</body>
</html>
