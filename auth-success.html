<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        var token = window.location.hash.substring(7);
        var t = window.TrelloPowerUp.iframe();
        
        t.arg('token', token)
            .then(function() {
                t.closePopup();
            });
    </script>
</body>
</html>
