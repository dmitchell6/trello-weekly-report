<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        .error-message {
            color: red;
            padding: 20px;
            text-align: center;
        }
        .success-message {
            color: green;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="status-message"></div>
    
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        function showMessage(message, isError = false) {
            const statusDiv = document.getElementById('status-message');
            statusDiv.className = isError ? 'error-message' : 'success-message';
            statusDiv.textContent = message;
        }

        try {
            const t = window.TrelloPowerUp.iframe();

            // Get the signed data from Trello
            t.arg('signed')
                .then(function(signed) {
                    if (!signed || !signed.token) {
                        throw new Error('No token received from Trello');
                    }

                    // Store the token
                    return t.arg('token', signed.token);
                })
                .then(function() {
                    showMessage('Authorization successful! Closing window...');
                    setTimeout(() => {
                        t.closePopup();
                    }, 1000);
                })
                .catch(function(error) {
                    throw new Error('Failed to process token: ' + error.message);
                });
            
        } catch (error) {
            console.error('Authorization error:', error);
            showMessage('Authorization failed: ' + error.message, true);
            
            setTimeout(() => {
                try {
                    window.TrelloPowerUp.iframe().closePopup();
                } catch (e) {
                    console.error('Failed to close popup:', e);
                }
            }, 3000);
        }
    </script>
</body>
</html>
